
# NOTE
#   - `#key = ...` 形式の表記は「明示的にデフォルト値に委ねてます」の意
#   - ここに書いた設定が丸ごと使われるのは、cmoc を介さない TUI 起動時の時だけ
#   - cmoc を介した起動の場合は、cmoc によって一部設定がオーバーライドされる

# 基本設定
# NOTE
#   TUI ユースでは人間の認知コストを最小化したいので品質最優先の設定にしている
model = "gpt-5.6-sol"
#review_model = ...
model_reasoning_effort = "max"
plan_mode_reasoning_effort = "max"
#model_context_window = ...
#model_auto_compact_token_limit = ...
#tool_output_token_limit = ...
#model_verbosity = ... 
#personality = ...

# ルートディレクトリ設定
#project_root_markers = ...

# 権限関係
# NOTE
#   cmoc は agent call ごとに --sandbox を明示し、permission profile を使用しない (oracle/doc/app_spec/codex_exec_rule.md) 。
#   そのため、この用途では default_permissions は使わない。
# NOTE
#   個別の許可設定は実際困ってから慎重に書き足していくこと。
sandbox_mode = "workspace-write"
#sandbox_workspace_write.exclude_slash_tmp = ...
#sandbox_workspace_write.exclude_tmpdir_env_var	 = ...
sandbox_workspace_write.network_access = true
#sandbox_workspace_write.writable_roots = ...
features.network_proxy.enabled = true
# NOTE
#   テスト時にサンドボックス内から ollama にアクセスする用の許可
features.network_proxy.domains."127.0.0.1" = "allow"
# NOTE
#   テスト用の ollama をダウンロードする用の許可
#   model blob 配信先が変わった場合は都度修正が必要
features.network_proxy.domains."ollama.com" = "allow"
features.network_proxy.domains."github.com" = "allow"
features.network_proxy.domains."release-assets.githubusercontent.com" = "allow"
features.network_proxy.domains."registry.ollama.ai" = "allow"
features.network_proxy.domains."dd20bb891979d25aebc8bec07b2b3bbc.r2.cloudflarestorage.com" = "allow"

# 承認関係
# NOTE
#   TUI ユースでは柔軟な実行を可能にしたい＋承認の手間は省きたい、ということでこの設定に落ち着いた
approval_policy = "on-request"
approvals_reviewer = "auto_review"

# Web検索モード
# NOTE
#   常に最新情報を見てほしいので live にする
web_search = "live"
#tools.web_search.context_size = ...

# 参照リンクは vscode フレンドリーにする
# NOTE
#   このリポジトリは vscode 前提なので明示する
file_opener = "vscode"

# 基本指示
# NOTE
#   cmoc で自己開発を行うということはつまり、プロンプトは動的生成されるということ
#   ここにプロンプトを書くことはコンセプトに反する
#developer_instructions = ...
#model_instructions_file = ...

# 履歴関係
# NOTE
#   困ることがあったら調整する
#history.persistence = ...
#model_reasoning_summary = ...
#hide_agent_reasoning = ...
#show_raw_agent_reasoning = ...
